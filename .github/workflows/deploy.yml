name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/ev-ownership-nextjs-site-OZEN0
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve base path
        id: pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable GitHub Pages (build type: GitHub Actions) on first run
          # so the workflow doesn't 404 when Pages hasn't been turned on yet.
          enablement: true

      - name: Build (static export)
        env:
          # actions/configure-pages exposes the repo path as base_path.
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
